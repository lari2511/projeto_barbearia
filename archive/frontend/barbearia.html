<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dono da Barbearia</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 450px; margin: 0 auto; padding: 15px; background-color: #f8f9fa; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        input, button { width: 100%; padding: 10px; margin-top: 8px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #28a745; color: white; font-weight: bold; border: none; cursor: pointer; }
        button:hover { background: #218838; }
        .secondary { background: #6c757d; }
        .secondary:hover { background: #5a6268; }
        .hidden { display: none; }
        
        /* Checkboxes Grandes */
        .opcao-servico { 
            display: block; margin: 8px 0; padding: 10px; 
            border: 1px solid #ddd; border-radius: 5px; background: #fff; cursor: pointer; user-select: none;
        }
        .opcao-servico:hover { background: #f1f1f1; }
        .opcao-servico input { transform: scale(1.5); margin-right: 10px; }

        /* Estilo do cartão de pedido */
        .chamado-card { border-left: 5px solid orange; background: #fff3cd; padding: 10px; margin-top: 10px; border-radius: 5px; }
        .chamado-card.aceito { border-left: 5px solid #28a745; background: #d4edda; }
        .chamado-card.concluido { border-left: 5px solid #6c757d; background: #e2e3e5; opacity: 0.8; }
        
        .dados-barbeiro { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(0,0,0,0.1); color: #155724; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="tela-login" class="card">
        <h2>🏠 Acesso do Dono</h2>
        <input type="email" id="login-email" placeholder="Email" value="dono@barbearia.com">
        <input type="password" id="login-senha" placeholder="Senha" value="123">
        <button onclick="fazerLogin()">Entrar</button>
        <button class="secondary" onclick="alternarTelas('tela-cadastro')">Criar Conta Nova</button>
    </div>

    <!-- CADASTRO -->
    <div id="tela-cadastro" class="card hidden">
        <h2>📝 Cadastrar Loja</h2>
        <p style="font-size: 0.9em; color: #666;">O endereço é importante para o barbeiro te encontrar.</p>
        <input type="text" id="cad-nome" placeholder="Nome da Loja">
        <input type="email" id="cad-email" placeholder="Email">
        <input type="password" id="cad-senha" placeholder="Senha">
        <input type="text" id="cad-endereco" placeholder="Endereço (Rua, Nº)">
        <input type="text" id="cad-cep" placeholder="CEP">
        <button onclick="fazerCadastro()">Salvar Cadastro</button>
        <button class="secondary" onclick="alternarTelas('tela-login')">Voltar</button>
    </div>

    <!-- PAINEL PRINCIPAL -->
    <div id="tela-painel" class="card hidden">
        <h2>📢 Pedir Reforço</h2>
        <p>Selecione o que você precisa:</p>
        
        <!-- Checkboxes de Serviços -->
        <label class="opcao-servico"><input type="checkbox" value="Corte Simples"> ✂️ Corte Simples</label>
        <label class="opcao-servico"><input type="checkbox" value="Barba"> 🪒 Barba</label>
        <label class="opcao-servico"><input type="checkbox" value="Corte + Barba"> 💈 Corte + Barba</label>
        <label class="opcao-servico"><input type="checkbox" value="Química"> 🧪 Química</label>
        <label class="opcao-servico"><input type="checkbox" value="Diária"> 🆘 Diária Completa</label>

        <button onclick="criarChamado()">CHAMAR AGORA 📢</button>
        
        <h3 style="margin-top: 20px; border-bottom: 1px solid #eee; padding-bottom: 5px;">Meus Pedidos:</h3>
        <div id="lista">Carregando...</div>
    </div>

    <script>
        const API = "http://127.0.0.1:8000";
        let token = null;

        function alternarTelas(id) {
            ['tela-login', 'tela-cadastro', 'tela-painel'].forEach(t => document.getElementById(t).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function fazerCadastro() {
            const dados = {
                nome: document.getElementById('cad-nome').value,
                email: document.getElementById('cad-email').value,
                senha: document.getElementById('cad-senha').value,
                endereco: document.getElementById('cad-endereco').value,
                cep: document.getElementById('cad-cep').value
            };
            
            if(!dados.endereco) return alert("O endereço é obrigatório!");

            try {
                const res = await fetch(`${API}/barbearia/cadastro`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(dados)
                });
                if(res.ok) {
                    alert("Cadastrado com sucesso! Faça login.");
                    alternarTelas('tela-login');
                } else {
                    alert("Erro ao cadastrar.");
                }
            } catch (e) { alert("Erro de conexão."); }
        }

        async function fazerLogin() {
            const dados = { 
                email: document.getElementById('login-email').value, 
                senha: document.getElementById('login-senha').value 
            };
            
            try {
                const res = await fetch(`${API}/barbearia/login`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(dados)
                });
                
                if(res.ok) {
                    const json = await res.json();
                    token = json.access_token;
                    alternarTelas('tela-painel');
                    setInterval(atualizarLista, 3000); // Atualiza a cada 3 segundos
                    atualizarLista();
                } else {
                    alert("Erro no login. Verifique email/senha.");
                }
            } catch (e) { alert("Erro de conexão. O servidor está rodando?"); }
        }

        async function criarChamado() {
            // Pega os checkboxes marcados
            const checks = document.querySelectorAll('input[type="checkbox"]:checked');
            if(checks.length === 0) return alert("Marque pelo menos um serviço!");
            
            const desc = Array.from(checks).map(c => c.value).join(", ");
            
            const res = await fetch(`${API}/chamados?token=${token}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ descricao: desc })
            });
            
            if(res.ok) {
                // Limpa checkboxes
                checks.forEach(c => c.checked = false);
                alert("Pedido Enviado! Aguarde um barbeiro aceitar.");
                atualizarLista();
            } else {
                alert("Erro ao enviar pedido.");
            }
        }

        async function atualizarLista() {
            if(!token) return;
            
            try {
                const res = await fetch(`${API}/barbearia/meus_pedidos?token=${token}`);
                const lista = await res.json();
                const div = document.getElementById('lista');
                div.innerHTML = "";
                
                if(lista.length === 0) div.innerHTML = "<p style='color:#999; text-align:center'>Nenhum pedido feito.</p>";

                lista.reverse().forEach(c => {
                    let extra = "";
                    let classe = "chamado-card";
                    let statusTexto = c.status;
                    
                    // Se tiver barbeiro, mostra os dados dele!
                    if(c.nome_barbeiro && c.nome_barbeiro !== "---") {
                        classe += " aceito";
                        extra = `<div class="dados-barbeiro">
                                    👤 Aceito por: ${c.nome_barbeiro} <br> 📞 Tel: ${c.telefone_barbeiro}
                                 </div>`;
                    }
                    
                    if(c.status.includes("CONCLUÍDO")) {
                        classe = "chamado-card concluido";
                    }

                    div.innerHTML += `
                    <div class="${classe}">
                        <div style="display:flex; justify-content:space-between;">
                            <b>Pedido #${c.id}</b>
                            <span style="font-size:0.8em">${statusTexto}</span>
                        </div>
                        <div style="margin-top:5px;">${c.descricao}</div>
                        ${extra}
                    </div>`;
                });
            } catch(e) { console.log("Erro ao atualizar lista"); }
        }
    </script>
</body>
</html>
