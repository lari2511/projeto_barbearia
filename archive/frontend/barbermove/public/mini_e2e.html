<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>BarberMove - Mini E2E</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;background:#0b0b0b;color:#fff;padding:20px}button{padding:10px 14px;border-radius:8px;background:#ff7a18;border:none;color:#fff}pre{background:#0f1720;padding:12px;border-radius:8px}</style>
  </head>
  <body>
    <h1>Mini E2E - Flow Assinatura + Cadeira</h1>
    <p>Usa o token salvo em <code>localStorage.token</code> (use <code>/set_token.js</code> para carregar).</p>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button id="run">Executar fluxo E2E</button>
      <button id="clear">Limpar localStorage</button>
    </div>
    <div id="out"></div>
    <pre id="log"></pre>
    <script src="/set_token.js"></script>
    <script src="/mini_e2e.js"></script>
  </body>
</html>
