<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1f2937" />
    <meta name="description" content="Conecte-se com barbeiros profissionais ou ofereça seus serviços" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BarberMove" />
    <link rel="manifest" href="/manifest.json" />
    
    <title>BarberMove - Seu Barbeiro a um Toque</title>
    <!-- Tailwind será compilado localmente (CDN removido para evitar bloqueios em mobile) -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
      }
      body {
        background: #0f0f0f;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      #root {
        width: 100%;
        min-height: 100dvh;
        height: auto;
        overflow: visible;
        -webkit-overflow-scrolling: touch;
      }
      @supports (padding: max(0px)) {
        #root {
          padding-top: max(0px, env(safe-area-inset-top));
          padding-bottom: max(0px, env(safe-area-inset-bottom));
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="/set_token.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
