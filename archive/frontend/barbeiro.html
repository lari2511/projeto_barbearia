<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sou Barbeiro</title>
    <style>
        body { font-family: sans-serif; max-width: 450px; margin: 0 auto; padding: 15px; background-color: #e3f2fd; } /* Azulzinho */
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin-top: 8px; box-sizing: border-box; }
        button { background: #1976d2; color: white; border: none; cursor: pointer; font-weight: bold; }
        .oferta { background: white; padding: 15px; margin-top: 10px; border-left: 5px solid #1976d2; }
        .hidden { display: none; }
        a { color: #1976d2; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="login" class="card">
        <h2>✂️ Área do Barbeiro</h2>
        <input id="l-email" placeholder="Email">
        <input id="l-senha" type="password" placeholder="Senha">
        <button onclick="logar()">Entrar</button>
        <button onclick="telas('cadastro')" style="background:#90caf9; color:#333; margin-top:5px;">Cadastrar</button>
    </div>

    <div id="cadastro" class="card hidden">
        <h2>🚀 Novo Barbeiro</h2>
        <input id="c-nome" placeholder="Seu Nome">
        <input id="c-email" placeholder="Email">
        <input id="c-senha" placeholder="Senha">
        <input id="c-tel" placeholder="WhatsApp">
        <button onclick="cadastrar()">Salvar</button>
        <button onclick="telas('login')" style="background:#90caf9; color:#333; margin-top:5px;">Voltar</button>
    </div>

    <div id="painel" class="card hidden">
        <h2>Trabalhos Disponíveis</h2>
        <div id="lista"></div>
        <h3>Meus Aceitos:</h3>
        <div id="meus"></div>
    </div>

    <script>
        const API = "http://127.0.0.1:8000";
        let token = null;

        function telas(id) {
            document.querySelectorAll('.card').forEach(d => d.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function cadastrar() {
            await fetch(`${API}/barbeiro/cadastro`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    nome: document.getElementById('c-nome').value,
                    email: document.getElementById('c-email').value,
                    senha: document.getElementById('c-senha').value,
                    telefone: document.getElementById('c-tel').value
                })
            });
            alert("Sucesso!"); telas('login');
        }

        async function logar() {
            const res = await fetch(`${API}/barbeiro/login`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: document.getElementById('l-email').value, senha: document.getElementById('l-senha').value })
            });
            if(res.ok) {
                token = (await res.json()).access_token;
                telas('painel');
                setInterval(atualizar, 3000);
            } else alert("Erro login");
        }

        async function atualizar() {
            const res = await fetch(`${API}/chamados/abertos`);
            const lista = await res.json();
            document.getElementById('lista').innerHTML = lista.map(c => `
                <div class="oferta">
                    <b>${c.nome_barbearia}</b><br>
                    📍 ${c.endereco} <a href="https://maps.google.com/?q=${c.endereco}" target="_blank">🗺️ Mapa</a><br>
                    <p>${c.descricao}</p>
                    <button onclick="aceitar(${c.id})">ACEITAR ✋</button>
                </div>
            `).join('');

            const resMeus = await fetch(`${API}/barbeiro/trabalhos?token=${token}`);
            const meus = await resMeus.json();
            document.getElementById('meus').innerHTML = meus.filter(c => c.status !== 'CONCLUÍDO ✅').map(c => `
                <div class="oferta" style="background:#e3f2fd">
                    <b>${c.nome_barbearia}</b> (Em andamento)<br>
                    <button onclick="finalizar(${c.id})">FINALIZAR ✅</button>
                </div>
            `).join('');
        }

        async function aceitar(id) { await fetch(`${API}/chamados/${id}/aceitar?token=${token}`, {method:'PUT'}); atualizar(); }
        async function finalizar(id) { await fetch(`${API}/chamados/${id}/finalizar`, {method:'PUT'}); atualizar(); }
    </script>
</body>
</html>
