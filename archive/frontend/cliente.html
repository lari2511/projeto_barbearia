<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sou Cliente</title>
    <style>
        body { font-family: sans-serif; max-width: 450px; margin: 0 auto; padding: 15px; background-color: #fff3e0; } /* Laranjinha */
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin-top: 8px; box-sizing: border-box; }
        button { background: #ff9800; color: white; border: none; cursor: pointer; font-weight: bold; }
        .loja { background: white; padding: 15px; margin-top: 10px; border-left: 5px solid #ff9800; }
        .hidden { display: none; }
        a { color: #e65100; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
    <div id="login" class="card">
        <h2>💇‍♂️ Área do Cliente</h2>
        <input id="l-email" placeholder="Email">
        <input id="l-senha" type="password" placeholder="Senha">
        <button onclick="logar()">Entrar</button>
        <button onclick="telas('cadastro')" style="background:#ffe0b2; color:#333; margin-top:5px;">Cadastrar</button>
    </div>

    <div id="cadastro" class="card hidden">
        <h2>📝 Novo Cliente</h2>
        <input id="c-nome" placeholder="Seu Nome">
        <input id="c-email" placeholder="Email">
        <input id="c-senha" placeholder="Senha">
        <input id="c-tel" placeholder="Celular">
        <button onclick="cadastrar()">Salvar</button>
        <button onclick="telas('login')" style="background:#ffe0b2; color:#333; margin-top:5px;">Voltar</button>
    </div>

    <div id="painel" class="card hidden">
        <h2>Barbearias na Região</h2>
        <p>Encontre a barbearia mais próxima:</p>
        <div id="lista">Carregando...</div>
    </div>

    <script>
        const API = "http://127.0.0.1:8000";
        
        function telas(id) {
            document.querySelectorAll('.card').forEach(d => d.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function cadastrar() {
            await fetch(`${API}/cliente/cadastro`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    nome: document.getElementById('c-nome').value,
                    email: document.getElementById('c-email').value,
                    senha: document.getElementById('c-senha').value,
                    telefone: document.getElementById('c-tel').value
                })
            });
            alert("Bem-vindo!"); telas('login');
        }

        async function logar() {
            const res = await fetch(`${API}/cliente/login`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: document.getElementById('l-email').value, senha: document.getElementById('l-senha').value })
            });
            if(res.ok) {
                telas('painel');
                carregarLojas();
            } else alert("Erro login");
        }

        async function carregarLojas() {
            const res = await fetch(`${API}/barbearias/todas`);
            const lista = await res.json();
            document.getElementById('lista').innerHTML = lista.map(loja => `
                <div class="loja">
                    <h3>💈 ${loja.nome}</h3>
                    <p>📍 ${loja.endereco} - CEP: ${loja.cep}</p>
                    <a href="https://maps.google.com/?q=${loja.endereco}" target="_blank">🚗 Ir para lá</a>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
