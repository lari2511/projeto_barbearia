services:
  - type: web
    name: barbermove-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://barbermove-api.onrender.com,https://barbermove-pwa.onrender.com,http://localhost:5173,http://localhost,https://localhost,capacitor://localhost,ionic://localhost
      - key: REQUIRE_EMAIL_VERIFIED
        value: "1"
      - key: VERIFICATION_LINK_BASE
        value: https://barbermove-api.onrender.com/api/v1/email/verificar?token=
      - key: SMTP_HOST
        value: sandbox.smtp.mailtrap.io
      - key: SMTP_PORT
        value: "2525"
      # Configure SMTP_USER and SMTP_PASSWORD diretamente no painel do Render
      # para evitar expor credenciais no código.
      - key: SMTP_FROM
        value: noreply@mailtrap.io
      - key: SMTP_USE_TLS
        value: "1"
      - key: API_URL
        value: https://barbermove-api.onrender.com
      - key: FRONTEND_URL
        value: https://barbermove-pwa.onrender.com
      - key: APK_DOWNLOAD_DIR
        value: APK_PRONTO
      - key: DATABASE_URL
        fromDatabase:
          name: barbermove-db
          property: connectionString

  - type: web
    name: barbermove-pwa
    runtime: static
    rootDir: barbermove
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://barbermove-api.onrender.com
      - key: VITE_WS_URL
        value: wss://barbermove-api.onrender.com/ws/notificacoes

databases:
  - name: barbermove-db
    plan: free
